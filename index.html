      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        // Melodía simple: dos tonos rápidos
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.3);
      } catch(e) {
        // Silencioso si falla el audio
      }
    }

      ctx.fill();

      ctx.fill();
    }

<body>
  <canvas id="game" width="500" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Jugador (Among Us)
    const player = {
      x: 250,
      y: 200,
      size: 30,
      speed: 4
    };

    // Texto flotante
    let floatingTexts = [];

    // Dibujar Among Us (versión simple)
    function drawAmongUs(x, y, size) {
      const s = size;
      // Cuerpo (óvalo)
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.ellipse(x, y, s * 0.6, s * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Visor
      ctx.fillStyle = '#87ceeb';
      ctx.beginPath();
      ctx.ellipse(x + s * 0.3, y - s * 0.15, s * 0.25, s * 0.2, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Mochila
      ctx.fillStyle = '#c73650';
      ctx.beginPath();
      ctx.ellipse(x - s * 0.5, y - s * 0.1, s * 0.2, s * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Piernas
      ctx.fillStyle = '#c73650';
      ctx.fillRect(x - s * 0.25, y + s * 0.6, s * 0.2, s * 0.3);
      ctx.fillRect(x + s * 0.05, y + s * 0.6, s * 0.2, s * 0.3);

      // Ojo (punto blanco en el visor)
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x + s * 0.35, y - s * 0.18, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }

    // Mostrar texto "among us" flotante
    function spawnText() {
      floatingTexts.push({
        x: player.x + (Math.random() - 0.5) * 40,
        y: player.y - 40,
        alpha: 1,
        life: 60
      });
    }

    // Actualizar textos
    function updateTexts() {
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y -= 1.2;
        t.alpha -= 0.018;
        t.life--;
        if (t.life <= 0 || t.alpha <= 0) {
          floatingTexts.splice(i, 1);
        }
      }
    }

    // Dibujar textos
    function drawTexts() {
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      for (const t of floatingTexts) {
        ctx.fillStyle = `rgba(255, 255, 255, ${t.alpha})`;
        ctx.strokeStyle = `rgba(0, 0, 0, ${t.alpha * 0.6})`;
        ctx.lineWidth = 3;
        ctx.strokeText('among us', t.x, t.y);
        ctx.fillText('among us', t.x, t.y);
      }
    }

    // Movimiento con teclas
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      // Cada tecla presionada muestra el texto
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') {
        spawnText();
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // Click también muestra el texto
    canvas.addEventListener('click', spawnText);

    // Bucle principal
    function update() {
      // Movimiento
      if (keys['ArrowUp']) player.y -= player.speed;
      if (keys['ArrowDown']) player.y += player.speed;
      if (keys['ArrowLeft']) player.x -= player.speed;
      if (keys['ArrowRight']) player.x += player.speed;

      // Límites
      player.x = Math.max(30, Math.min(470, player.x));
      player.y = Math.max(40, Math.min(360, player.y));

      updateTexts();

      // Dibujar
      ctx.clearRect(0, 0, 500, 400);
      drawAmongUs(player.x, player.y, player.size);
      drawTexts();

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
